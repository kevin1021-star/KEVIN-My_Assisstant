<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVIN | Neural HUD v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/design_system.css">
    <style>
        .hud-container {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 80px 1fr 100px;
            gap: var(--p-4);
            padding: var(--p-4);
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 10;
        }

        .center-hud {
            grid-column: 2;
            grid-row: 2;
            position: relative;
            border: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(0.5) contrast(1.2);
        }

        .hex-overlay {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iMTA0IiB2aWV3Qm94PSIwIDAgNjAgMTA0IiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxwYXRoIGQ9Ik0zMCAwdjI2bTI1LjI4IDE0LjU5TDMwIDI2TDQuNzIgNDAuNTltMCAyMmwyNS4yOCAxNC41OUw1NS4yOCA2Mi41OSIgc3Ryb2tlPSJyZ2JhKDAsIDI0MiwgMjU1LCAwLjA1KSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+');
            pointer-events: none;
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: rgba(0, 242, 255, 0.1);
            animation: scan 6s linear infinite;
            z-index: 5;
        }

        @keyframes scan {
            from { top: -5%; }
            to { top: 105%; }
        }

        .panel-header {
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            padding: var(--p-2) var(--p-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-log {
            flex: 1;
            overflow-y: auto;
            padding: var(--p-4);
            display: flex;
            flex-direction: column;
            gap: var(--p-2);
        }

        #chat-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: #fff;
            padding: 10px;
            font-family: var(--font-mono);
            width: 100%;
            outline: none;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: var(--p-4);
        }
    </style>
</head>
<body>
    <div class="hex-overlay" style="opacity: 0.3;"></div>
    
    <div class="hud-container">
        <!-- Header -->
        <header class="glass-panel" style="grid-column: 1 / span 3; display: flex; justify-content: space-between; align-items: center; padding: 0 var(--p-6);">
            <div class="stark-corner tl"></div><div class="stark-corner tr"></div><div class="stark-corner bl"></div><div class="stark-corner br"></div>
            <div>
                <span class="eyebrow">NEURAL_OS // V2.0.4</span>
                <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 0.1em;">KEVIN_INTELLIGENCE</h1>
            </div>
            <div style="text-align: right;">
                <div id="clock" style="font-size: 1.5rem; font-family: var(--font-mono);">00:00:00</div>
                <div id="connection-pill" class="eyebrow" style="color: var(--alert);">LINK_OFFLINE</div>
            </div>
        </header>

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="glass-panel" style="flex: 1;">
                <div class="stark-corner tl"></div><div class="stark-corner tr"></div><div class="stark-corner bl"></div><div class="stark-corner br"></div>
                <div class="panel-header"><span class="eyebrow">Core Telemetry</span></div>
                <div style="padding: var(--p-4); display: flex; justify-content: space-around;">
                    <div id="cpu-gauge-v2"></div>
                    <div id="mem-gauge-v2"></div>
                </div>
                <div style="padding: 0 var(--p-4) var(--p-4);">
                    <span class="eyebrow" style="font-size: 0.5rem;">Neural Log</span>
                    <div id="neural-log" class="glass-panel" style="height: 150px; margin-top: 10px; padding: 10px; font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); overflow: hidden;">
                        INITIALIZING_SYSTEM...
                    </div>
                </div>
            </div>
            
            <div class="glass-panel" style="height: 120px;">
                <div class="stark-corner tl"></div><div class="stark-corner tr"></div><div class="stark-corner bl"></div><div class="stark-corner br"></div>
                <div class="panel-header"><span class="eyebrow">Shortcuts</span></div>
                <div style="padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="tech-btn" style="font-size: 0.7rem;" onclick="socket.send('switch tab')">TAB</button>
                    <button class="tech-btn" style="font-size: 0.7rem;" onclick="socket.send('switch app')">APP</button>
                </div>
            </div>
        </aside>

        <!-- Center HUD -->
        <main class="center-hud glass-panel">
            <div class="stark-corner tl"></div><div class="stark-corner tr"></div><div class="stark-corner bl"></div><div class="stark-corner br"></div>
            <div class="scanline"></div>
            <video id="webcam" class="video-feed" autoplay playsinline muted></video>
            <canvas id="gesture-canvas" style="position: absolute; inset: 0; z-index: 10;"></canvas>
            
            <div style="position: absolute; top: 20px; left: 20px; z-index: 20;">
                <div class="glass-panel" style="padding: 5px 15px;">
                    <span id="mode-badge" class="eyebrow" style="color: var(--accent);">IDLE</span>
                </div>
            </div>
            
            <div style="position: absolute; bottom: 20px; right: 20px; z-index: 20; text-align: right;">
                <div class="glass-panel" style="padding: 5px 15px;">
                    <span id="vision-state" class="eyebrow">HANDS_0</span>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="glass-panel" style="flex: 1; display: flex; flex-direction: column;">
                <div class="stark-corner tl"></div><div class="stark-corner tr"></div><div class="stark-corner bl"></div><div class="stark-corner br"></div>
                <div class="panel-header"><span class="eyebrow">Intelligence Feed</span></div>
                <div id="chat-log" class="chat-log"></div>
                <div style="padding: var(--p-4); background: rgba(0,0,0,0.3);">
                    <textarea id="chat-input" rows="2" placeholder="SECURE_COMMAND..."></textarea>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button id="mic-btn" class="tech-btn" style="flex: 1;">VOICE</button>
                        <button id="send-btn" class="tech-btn" style="flex: 1;">EXEC</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Footer -->
        <footer class="glass-panel" style="grid-column: 1 / span 3; display: flex; justify-content: space-between; align-items: center; padding: 0 var(--p-6);">
            <div class="stark-corner tl"></div><div class="stark-corner tr"></div><div class="stark-corner bl"></div><div class="stark-corner br"></div>
            <div style="display: flex; gap: 20px;">
                <span class="eyebrow">VOICE_AUTH: <span style="color: #fff;">AUTHORIZED</span></span>
                <span class="eyebrow">GESTR_LINK: <span style="color: #fff;">ACTIVE</span></span>
            </div>
            <div>
                <button id="deploy-companion" class="tech-btn" style="padding: 5px 15px; font-size: 0.7rem; margin-right: 10px; border-color: var(--secondary); color: var(--secondary);">DEPLOY COMPANION</button>
                <button id="speak-toggle" class="tech-btn" style="padding: 5px 15px; font-size: 0.7rem;">VOICE: ACTIVE</button>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById("deploy-companion").onclick = () => {
            socket.send("summon partner");
            log("Deploying Desktop Partner...");
        };
    </script>

    <script src="/static/js/hud_components.js"></script>
    <script src="/static/js/neural_control.js"></script>
</body>
</html>
