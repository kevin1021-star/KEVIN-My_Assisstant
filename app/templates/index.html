<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin | AS's Tech Partner</title>
    <!-- Use Google Fonts for the techy UI -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- OCR Intelligence for Air Writing -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="hud-container">
        <!-- Top Navigation / Status -->
        <header class="hud-header">
            <div class="system-status">
                <span class="status-indicator online"></span>
                <span>SYSTEM CORE: ACTIVE</span>
            </div>
            <div class="title">KEVIN // PARTNER.INTERFACE</div>
            <div class="time-module" id="clock">00:00:00</div>
        </header>

        <!-- Main Display Area -->
        <main class="hud-main">
            <!-- Left Panel (Vision Module) -->
            <aside class="panel left-panel">
                <h3>VISION_FEED</h3>
                <div class="vision-box" id="vision-box">
                    <video id="webcam" autoplay playsinline style="display:none;"></video>
                    <canvas id="gesture-canvas"></canvas>
                </div>

                <div class="telemetry-box">
                    <h3>SYSTEM_TELEMETRY</h3>
                    <div class="stat-item">
                        <span>CPU_LOAD</span>
                        <div class="bar-container"><div class="bar" id="cpu-bar" style="width: 0%"></div></div>
                    </div>
                    <div class="stat-item">
                        <span>MEM_USAGE</span>
                        <div class="bar-container"><div class="bar" id="ram-bar" style="width: 0%"></div></div>
                    </div>
                </div>
            </aside>

            <!-- Center Panel (Central Core & Air Writing) -->
            <section class="panel center-panel">
                <!-- Mode Status Tags -->
                <div class="vision-status-bar">
                    <div id="mode-writing" class="mode-tag">AIR_WRITE</div>
                    <div id="mode-mouse" class="mode-tag">NEURAL_MOUSE</div>
                </div>

                <canvas id="air-canvas"></canvas>

                <div class="core-orb" id="core-orb">
                   <div class="orb-inner"></div>
                </div>
                
                <div class="controls">
                    <button class="cyber-btn" id="start-btn">ENGAGE_COMMS</button>
                </div>
            </section>

            <!-- Right Panel (Console) -->
            <aside class="panel right-panel">
                <h3>PARTNER_CONSOLE</h3>
                <div class="chat-log" id="chat-log">
                    <div class="message system-msg">> KEVIN INIT COMPLETED. READY FOR AS.</div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Load the Logic -->
    <script src="/static/js/main.js"></script>
</body>
</html>
